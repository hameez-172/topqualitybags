<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE BAGS | Premium Executive Leather Bag</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1488498839308041'); 
    fbq('track', 'PageView');
    fbq('track', 'ViewContent', { content_name: 'Premium Leather Bag', content_category: 'Accessories', value: 3000.00, currency: 'PKR' });
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #F3F4F6; --surface: #FFFFFF; --primary: #111827; --dark: #000000; --accent: #F59E0B; --accent-hover: #D97706; --success: #10B981; --slate: #6B7280; --blue: #3B82F6; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--primary); }
        .wrapper { max-width: 500px; margin: 0 auto; background: var(--surface); min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        .top-promo-bar { background: var(--primary); color: #fff; font-size: 11px; text-align: center; padding: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        header { padding: 20px 15px; text-align: center; }
        .logo { font-size: 26px; font-weight: 900; color: var(--dark); text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .product-image { width: 100%; border-radius: 12px; margin: 15px 0; }
        .order-box { background: var(--primary); border-radius: 16px; padding: 35px 25px; color: white; margin: 20px; border: 4px solid var(--accent); }
        .input-group { position: relative; margin-bottom: 18px; }
        .input-group i { position: absolute; left: 16px; top: 18px; color: #6B7280; }
        input, textarea, select { width: 100%; padding: 16px 16px 16px 48px; border-radius: 10px; border: 2px solid #D1D5DB; font-size: 16px; font-weight: 600; }
        .submit-btn { background: var(--accent); color: #000; width: 100%; padding: 22px; border: none; border-radius: 10px; font-size: 19px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="top-promo-bar">🚚 FREE & FAST DELIVERY NATIONWIDE</div>
    <header>
        <div class="logo">LUXE <span>BAGS</span></div>
    </header>

    <div class="content">
        <img src="1.jpeg" class="product-image" alt="Bag" onerror="this.src='https://placehold.co/500x350/111827/F59E0B?text=Premium+Leather+Bag'">
        
        <div class="order-box">
            <h2>Enter Delivery Details</h2>
            <form id="orderForm">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="cust_name" placeholder="Full Name" required></div>
                <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="cust_phone" placeholder="WhatsApp Number" required></div>
                <div class="input-group"><i class="fas fa-city"></i>
                    <select id="cust_city" required>
                        <option value="" disabled selected>Select Your City</option>
                        <option value="Karachi">Karachi</option>
                        <option value="Lahore">Lahore</option>
                        <option value="Islamabad">Islamabad</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group"><i class="fas fa-map-marker-alt"></i><textarea id="cust_address" placeholder="Complete Home Address" required></textarea></div>
                <button type="submit" id="submitBtn" class="submit-btn">ORDER NOW - PAY ON DELIVERY</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById("orderForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving Order...';

        const payload = {
            "order_id": '#BAG-' + Math.floor(1000 + Math.random() * 9000),
            "name": document.getElementById('cust_name').value,
            "phone": document.getElementById('cust_phone').value,
            "address": document.getElementById('cust_address').value,
            "city": document.getElementById('cust_city').value,
            "product": "Premium Leather Bag (3000)", 
            "total_bill": "Rs 3000",
            "timestamp": new Date().toLocaleString('en-PK')
        };

        try {
            fbq('track', 'Purchase', { value: 3000, currency: 'PKR' });

            // Saving directly to Google Sheets only
            await fetch('https://sheetdb.io/api/v1/fud286kh3rn9s', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [payload] })
            });

            window.location.href = "Thank_you.html?oid=" + payload.order_id;
        } catch (error) {
            alert("Order saved, please contact us on WhatsApp.");
            window.location.href = "https://wa.me/923426881848";
        }
    });
</script>
</body>
</html>
